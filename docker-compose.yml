version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stellarpay-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stellarpay
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stellarpay-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stellarpay-cache
    ports:
      - '6379:6379'
    networks:
      - stellarpay-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stellarpay-app
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stellarpay
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stellarpay-network
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  stellarpay-network:
    driver: bridge